# Deux regles du meme fichier rules/services.rules.md se declenchent sur le meme
# fichier source: le nom en `*Manager` (SRV-001) et l injection par champ
# `@Autowired` (SRV-002). Un seul referentiel doit etre charge pour les deux.
expected_findings:
  - rule_id: SRV-001
    file: src/main/java/demo/UserManager.java
    message_contains: ["Service"]
  - rule_id: SRV-002
    file: src/main/java/demo/UserManager.java
    message_contains: ["Autowired"]
max_findings: 2
context_expectations:
  exact_files_read:
    - rules/services.rules.md
